apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: media
  name: media
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: arr
  namespace: media
  labels:
    release: prom
spec:
  namespaceSelector:
    matchNames:
      - media
  selector:
    matchLabels:
      app.kubernetes.io/name: arr
  endpoints:
    - port: metrics
      scheme: http
      interval: 30s
