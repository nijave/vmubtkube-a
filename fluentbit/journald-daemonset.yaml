apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-journald
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: fluent-bit-journald
  template:
    metadata:
      labels:
        app: fluent-bit-journald
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:5.0
          args: ["-c", "/fluent-bit/etc/fluent-bit.conf"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: journal
              mountPath: /var/log/journal
              readOnly: true
            - name: machine-id
              mountPath: /etc/machine-id
              readOnly: true
            - name: state
              mountPath: /var/lib/fluent-bit
      volumes:
        - name: config
          configMap:
            name: fluent-bit-journald-config
        - name: journal
          hostPath:
            path: /var/log/journal
            type: Directory
        - name: machine-id
          hostPath:
            path: /etc/machine-id
            type: File
        - name: state
          hostPath:
            path: /var/lib/fluent-bit-journald
            type: DirectoryOrCreate
