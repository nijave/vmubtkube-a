[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# Generic tcp/udp inputs (rather than the syslog plugin) so we can chain
# multiple parsers and accept both RFC 3164 and RFC 5424 on the same port.
# Format=none puts the raw payload in the `log` field for the parser filters
# to consume.
[INPUT]
    Name          tcp
    Tag           syslog.tcp
    Listen        0.0.0.0
    Port          5140
    Format        none
    Chunk_Size    32
    Buffer_Size   64

[INPUT]
    Name          udp
    Tag           syslog.udp
    Listen        0.0.0.0
    Port          5140
    Format        none
    Chunk_Size    32
    Buffer_Size   64

# Try RFC 5424 first. On success, `log` is replaced with parsed fields.
# On failure, `log` is left intact and the next filter tries RFC 3164.
[FILTER]
    Name          parser
    Match         syslog.*
    Key_Name      log
    Parser        syslog-rfc5424
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name          parser
    Match         syslog.*
    Key_Name      log
    Parser        syslog-rfc3164
    Reserve_Data  On
    Preserve_Key  Off

# Map both 3164 and 5424 capture names to OTel semantic conventions. modify
# silently skips renames whose source key is absent, so listing both formats'
# field names is safe — only the keys produced by whichever parser matched
# will be present.
[FILTER]
    Name    modify
    Match   syslog.*
    Rename  host  host.name
    Rename  ident service.name
    Rename  app   service.name
    Rename  pid   process.pid
    Rename  proc  process.pid
    Add     log.source syslog

[OUTPUT]
    Name          opentelemetry
    Match         syslog.*
    # Route through the monitoring otel-collector so log.source=syslog records
    # get host.name / service.name promoted to resource attrs (matches journald).
    Host          otel-collector.k8s.somemissing.info
    Port          4318
    Logs_uri      /v1/logs
    Tls           On
    Tls.verify    On
    Compress      gzip
    Log_response_payload False
    Logs_body_key message
