[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<version>[0-9])\s+(?<time>[^ ]+)\s+(?<host>[^ ]+)\s+(?<app>[^ ]+)\s+(?<proc>[^ ]+)\s+(?<msgid>[^ ]+)\s+(?<sd>(\[[^\]]*\]|-))\s*(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# Ubiquiti / EdgeOS-style messages: `[unix.fractional_ts] payload`
[PARSER]
    Name        syslog-bracketed-ts
    Format      regex
    Regex       ^\[(?<time>[0-9]+(?:\.[0-9]+)?)\]\s*(?<message>.*)$
    Time_Key    time
    Time_Format %s.%L
    Time_Keep   On

# Final fallback: capture the entire line as `message` so nothing is dropped
# and Logs_body_key still has a field to extract.
[PARSER]
    Name        syslog-passthrough
    Format      regex
    Regex       ^(?<message>.*)$
