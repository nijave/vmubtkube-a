[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   Off

[INPUT]
    Name            systemd
    Tag             host.journal
    Path            /var/log/journal
    DB              /var/lib/fluent-bit/journald.db
    DB.Sync         Normal
    Read_From_Tail  On
    Strip_Underscores On

# Promote useful journald fields to top-level keys before export
[FILTER]
    Name    modify
    Match   host.journal
    Rename  SYSTEMD_UNIT      service.name
    Rename  HOSTNAME          host.name
    Rename  MESSAGE           message
    Add     log.source        journald

# Fall back to SYSLOG_IDENTIFIER when SYSTEMD_UNIT is absent
[FILTER]
    Name    modify
    Match   host.journal
    Condition Key_does_not_exist service.name
    Rename  SYSLOG_IDENTIFIER service.name

[OUTPUT]
    Name          opentelemetry
    Match         host.journal
    # Use the external-DNS hostname so the Let's Encrypt cert validates
    # (SAN: otel-collector.k8s.somemissing.info). In-cluster traffic still
    # routes via the same ClusterIP; ServiceIPs are routable cluster-wide.
    Host          otel-collector.k8s.somemissing.info
    Port          4318
    Logs_uri      /v1/logs
    Tls           On
    Tls.verify    On
    Compress      gzip
    Log_response_payload False
    # Without this, the entire record is serialized into Body and the other
    # fields (service.name, host.name, etc.) never make it to LogAttributes.
    Logs_body_key            message
    # Required to ship every other journald field (PID, COMM, EXE, BOOT_ID,
    # MACHINE_ID, host.name, service.name, etc.) as LogAttributes. Default false.
    Logs_body_key_attributes On
