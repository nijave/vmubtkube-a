apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - journald-daemonset.yaml

# Hash-suffixed ConfigMaps so any config change rolls the workload that
# references it (Kustomize rewrites the configMap.name in pod specs).
configMapGenerator:
  - name: fluent-bit-journald-config
    files:
      - conf/journald/fluent-bit.conf
      - conf/journald/parsers.conf
