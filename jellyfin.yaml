---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nfs:
    server: nas.apps.somemissing.info
    path: /media/av
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Ti
  volumeName: jellyfin-media
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-data
  namespace: media
spec:
  accessModes:
    - ReadWriteOncePod
  resources:
    requests:
      storage: 40Gi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-repo-jellyfin
  namespace: media
spec:
  refreshInterval: 300s
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  target:
    template:
      type: Opaque
      data:
        RESTIC_REPOSITORY: s3:https://vmubthh01.s.nickv.me:/volsync-jellyfin
        RESTIC_PASSWORD: "{{ .password }}"
        AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
  data:
  - secretKey: password
    remoteRef:
      key: volsync-restic-password-1
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: accessKey
    remoteRef:
      key: volsync-restic-repo-id-1
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: secretKey
    remoteRef:
      key: volsync-restic-repo-secret-1
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
---
# Backs up the whole PVC including JELLYFIN_CACHE_DIR — volsync's restic
# mover has no path excludes, so transcoding/image cache churn lands in
# snapshots. Restic dedup keeps this tolerable.
# cacheCapacity covers restic's repo cache (index + cached packs); the repo
# holds ~7.5Gi of data plus transcode churn between prunes, which overflowed
# the prior 4Gi cache with "no space left on device". Sized above the repo.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: jellyfin-data
  namespace: media
spec:
  sourcePVC: jellyfin-data
  trigger:
    schedule: "*/30 * * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-repo-jellyfin
    cacheCapacity: 8Gi
    moverSecurityContext:
      runAsUser: 1009
      runAsGroup: 1001
      fsGroup: 1001
    retain:
      hourly: 6
      daily: 5
      weekly: 4
      monthly: 3
      yearly: 0
    copyMethod: Clone
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: jellyfin.apps.somemissing.info
  labels:
    app.kubernetes.io/component: jellyfin-server
    app.kubernetes.io/name: jellyfin
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: https
    port: 443
    targetPort: https
  selector:
    app.kubernetes.io/component: jellyfin-server
    app.kubernetes.io/name: jellyfin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app.kubernetes.io/component: jellyfin-server
    app.kubernetes.io/name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: jellyfin-server
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/component: jellyfin-server
        app.kubernetes.io/name: jellyfin
    spec:
      hostNetwork: true  # required for DLNA
      securityContext:
        runAsUser: 1009
        runAsGroup: 1001
      containers:
      - name: jellyfin
        image: registry.apps.nickv.me/jellyfin:v10.11.5-nv-hdr-patch
        # command: [sleep, infinity]
        env:
        - name: TZ
          value: "UTC"
        - name: JELLYFIN_CACHE_DIR
          value: /var/lib/jellyfin/cache
        - name: JELLYFIN_CONFIG_DIR
          value: /var/lib/jellyfin/config
        - name: JELLYFIN_DATA_DIR
          value: /var/lib/jellyfin
        - name: JELLYFIN_LOG_DIR
          value: /var/lib/jellyfin/logs
        ports:
        - containerPort: 8096
          name: http
          protocol: TCP
        - containerPort: 8920
          name: https
          protocol: TCP
        - containerPort: 7359
          name: discovery
          protocol: UDP
        - containerPort: 1900
          name: dlna
          protocol: UDP
        startupProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        volumeMounts:
        - name: config
          mountPath: /var/lib/jellyfin
        - name: media
          mountPath: /media
        resources:
          requests:
            memory: "1Gi"
            cpu: "10m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: jellyfin-data
      - name: media
        persistentVolumeClaim:
          claimName: jellyfin-media
---
