apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calico
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: tigera-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    - CreateNamespace=true
  source:
    chart: tigera-operator
    repoURL: https://docs.tigera.io/calico/charts
    targetRevision: v3.31.5
    helm:
      releaseName: calico
      valuesObject:
        installation:
          registry: quay.io
---
apiVersion: crd.projectcalico.org/v1
kind: BGPConfiguration
metadata:
  name: default
spec:
  asNumber: 64512
  serviceClusterIPs:
  - cidr: 192.168.208.0/20
  serviceLoadBalancerAggregation: Enabled
---
apiVersion: crd.projectcalico.org/v1
kind: BGPPeer
metadata:
  name: router
spec:
  asNumber: 64512
  peerIP: 172.16.3.254
  filters:
  - default
---
apiVersion: crd.projectcalico.org/v1
kind: BGPFilter
metadata:
  name: default
spec:
  exportV4:
  # Allow Service ClusterIP CIDR
  - action: Accept
    cidr: 192.168.208.0/20
    matchOperator: In
  # Allow LoadBalancer IPPool
  - action: Accept
    cidr: 192.168.240.0/28
    matchOperator: In
  - action: Reject
---
apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: loadbalancer-pool
spec:
  # Outside the LAN (172.16.0.0/22) so senders route via the BGP-speaking
  # gateway instead of trying (and failing) to ARP for the IP locally.
  cidr: 192.168.240.0/28
  blockSize: 32
  ipipMode: Never
  vxlanMode: Never
  natOutgoing: true
  nodeSelector: all()
  # Automatic so Calico's loadbalancer controller can pull IPs from this
  # pool for type=LoadBalancer Services. Manual mode requires explicit
  # allocation calls and silently skips controller-driven assignment.
  assignmentMode: Automatic
  allowedUses:
  - LoadBalancer
---
apiVersion: crd.projectcalico.org/v1
kind: FelixConfiguration
metadata:
  name: default
spec:
  bpfEnabled: false
  bpfConnectTimeLoadBalancing: TCP
  bpfHostNetworkedNATWithoutCTLB: Enabled
  floatingIPs: Disabled
  healthPort: 9099
  logSeverityScreen: Info
  nftablesMode: Disabled
