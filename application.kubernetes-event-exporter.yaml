apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-event-exporter
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
  source:
    chart: kubernetes-event-exporter
    repoURL: https://resmoio.github.io/kubernetes-event-exporter
    targetRevision: 1.7.0
    helm:
      releaseName: kubernetes-event-exporter
      valuesObject:
        replicaCount: 1
        revisionHistoryLimit: 3
        leaderElection:
          enabled: true
          leaseDuration: 30
          renewDeadline: 20
          retryPeriod: 5
        config:
          logLevel: warn
          logFormat: json
          route:
            routes:
            - match:
              - receiver: stdout
            # Drop noisy lease-renewal events so we don't drown the log stream
              drop:
              - reason: "LeaderElection"
              - source:
                  component: "default-scheduler"
                  reason: "Scheduled"
          receivers:
          - name: stdout
            stdout: {}
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prom
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-event-exporter-rules
  namespace: monitoring
  labels:
    release: prom
spec:
  groups:
  - name: kubernetes-event-exporter
    rules:
    - alert: EventExporterDown
      annotations:
        summary: kubernetes-event-exporter has no ready pods.
        description: Kubernetes events are not being shipped to HyperDX. Investigate the deployment in the monitoring namespace.
      expr: |
        kube_deployment_status_replicas_ready{deployment="kubernetes-event-exporter",namespace="monitoring"}
          < kube_deployment_spec_replicas{deployment="kubernetes-event-exporter",namespace="monitoring"}
      for: 30m
      labels:
        severity: warning
