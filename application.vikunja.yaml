apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2
  source:
    # go-vikunja/helm-chart vendored from git (v2.0.2) into vendored/vikunja/base
    # with its bjw-s `common` dependency built into charts/ (see vendir.yml), so
    # ArgoCD renders it offline. OCI publishing stalled at chart 2.0.0; git tags
    # stay current. The Vikunja app version is set by vikunja.image.tag below,
    # not the chart's appVersion.
    repoURL: ssh://git@github.com/nijave/vmubtkube-a.git
    path: vendored/vikunja/base
    targetRevision: HEAD
    helm:
      releaseName: vikunja
      valuesObject:
        vikunja:
          image:
            # bjw-s common renders <repository>:<tag> and ignores the `registry`
            # key, so `repository` carries the full mirror path. The
            # `registry`+`tag` siblings exist so .ci/mirror-images.sh (which
            # greps sibling registry/tag maps) and Renovate's regex manager
            # resolve the upstream docker.io/vikunja/vikunja.
            repository: registry.apps.nickv.me/vikunja/vikunja
            # renovate: datasource=docker depName=vikunja/vikunja
            registry: registry.apps.nickv.me/vikunja/vikunja
            tag: "2.4.0"
          # Exposed via an external-dns annotation on the chart's ClusterIP
          # Service (service.main below) rather than the chart's
          # nginx-oriented Ingress or a Contour HTTPProxy; the cluster Service
          # network is LAN-routable, matching the prowlarr/sonarr pattern.
          ingress:
            main:
              enabled: false
          service:
            main:
              # external-dns publishes an A record (vikunja.k8s.somemissing.info)
              # for the ClusterIP. Front the container's 3456 with port 80 so the
              # public URL needs no port suffix.
              annotations:
                external-dns.alpha.kubernetes.io/hostname: vikunja.k8s.somemissing.info
              ports:
                http:
                  port: 80
                  targetPort: 3456
          persistence:
            # Holds task attachments, avatars, project backgrounds and data
            # exports — required even with an external database. Backed up via
            # volsync (see vikunja.yaml).
            data:
              enabled: true
              accessMode: ReadWriteOnce
              size: 5Gi
            # SQLite DB PVC — unused with the external cnpg Postgres wired below.
            database:
              enabled: false
            # cnpg's self-signed cluster CA. Mount only ca.crt — the default-ca
            # secret also holds the private ca.key.
            pgca:
              enabled: true
              type: secret
              name: default-ca
              mountPath: /etc/vikunja/pgca
              readOnly: true
              items:
                - key: ca.crt
                  path: ca.crt
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          configMaps:
            config:
              enabled: true
              data:
                config.yml: |
                  # https://vikunja.io/docs/config-options/
                  service:
                    # Must match the external-dns hostname on service.main above.
                    # Plain HTTP: traffic reaches the ClusterIP directly with no
                    # TLS-terminating proxy in front.
                    publicurl: http://vikunja.k8s.somemissing.info
          env:
            VIKUNJA_DATABASE_TYPE: postgres
            VIKUNJA_DATABASE_HOST: default-rw.default.svc.cluster.local
            VIKUNJA_DATABASE_USER: vikunja
            VIKUNJA_DATABASE_NAME: vikunja
            VIKUNJA_DATABASE_SSLMODE: verify-full
            VIKUNJA_DATABASE_SSLROOTCERT: /etc/vikunja/pgca/ca.crt
            VIKUNJA_DATABASE_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-vikunja-user
                  key: password
        # One-time (idempotent) bootstrap of the initial user, rendered through
        # the chart's additionalObjects hook so it stays inside this Application.
        # The official vikunja image is FROM scratch (no shell), so an
        # initContainer copies a static (uclibc) busybox into a shared volume and
        # the main container runs the vikunja CLI under it to check-then-create.
        # The CLI talks to Postgres directly, so this needs neither the running
        # server nor the API. Admin is intentionally not set: instance-admin is a
        # no-op without a Vikunja Pro license (and the set-admin CLI refuses).
        additionalObjects:
          # Random password for the bootstrap user. mittwald secret-generator
          # fills data.password once and never rotates it. Retrieve with:
          #   kubectl -n default get secret vikunja-bootstrap-nick \
          #     -o jsonpath='{.data.password}' | base64 -d
          - apiVersion: v1
            kind: Secret
            metadata:
              name: vikunja-bootstrap-nick
              namespace: default
              annotations:
                secret-generator.v1.mittwald.de/autogenerate: password
            stringData:
              username: nick
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: vikunja-bootstrap-user
              namespace: default
              annotations:
                # Re-run every sync (the script is idempotent). Modelled as a
                # hook so ArgoCD recreates the immutable Job instead of failing
                # to patch it; the previous run is removed before the next.
                argocd.argoproj.io/hook: Sync
                argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
            spec:
              backoffLimit: 6
              ttlSecondsAfterFinished: 86400
              template:
                spec:
                  restartPolicy: OnFailure
                  securityContext:
                    runAsUser: 1000
                    runAsGroup: 1000
                    fsGroup: 1000
                  initContainers:
                    # Static busybox runs inside the scratch vikunja image and
                    # gives the main container a shell for the check-then-create.
                    - name: copy-busybox
                      # renovate: datasource=docker depName=busybox
                      image: busybox:1.37.0-uclibc
                      command: [cp, /bin/busybox, /shared/busybox]
                      volumeMounts:
                        - name: shared
                          mountPath: /shared
                  containers:
                    - name: bootstrap
                      # Same image/tag as the Deployment so the migrations the
                      # CLI runs on startup match the server's schema.
                      image: "{{ $.Values.vikunja.image.repository }}:{{ $.Values.vikunja.image.tag }}"
                      command:
                        - /shared/busybox
                        - sh
                        - -c
                        - |
                          set -eu
                          # Exit-code existence gate (0 = found). Deliberately not
                          # `create ... || true`, which would also swallow real
                          # failures (DB down, bad creds).
                          if /app/vikunja/vikunja user list -e nick@venenga.com >/dev/null 2>&1; then
                            echo "user nick already exists; nothing to do"
                            exit 0
                          fi
                          echo "creating user nick"
                          /app/vikunja/vikunja user create \
                            -u nick -e nick@venenga.com -p "$BOOTSTRAP_PASSWORD"
                      env:
                        - name: VIKUNJA_DATABASE_TYPE
                          value: postgres
                        - name: VIKUNJA_DATABASE_HOST
                          value: default-rw.default.svc.cluster.local
                        - name: VIKUNJA_DATABASE_USER
                          value: vikunja
                        - name: VIKUNJA_DATABASE_NAME
                          value: vikunja
                        - name: VIKUNJA_DATABASE_SSLMODE
                          value: disable
                        - name: VIKUNJA_DATABASE_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: postgres-vikunja-user
                              key: password
                        # secretKeyRef to the generated password. If mittwald
                        # hasn't populated it yet the pod waits (retries) rather
                        # than creating the user with an empty password.
                        - name: BOOTSTRAP_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: vikunja-bootstrap-nick
                              key: password
                      volumeMounts:
                        - name: shared
                          mountPath: /shared
                        # Same config the Deployment mounts. The CLI runs full
                        # config validation on startup (FullInit), which requires
                        # service.publicurl; without it both `user list` and
                        # `user create` abort before touching the database.
                        - name: config
                          mountPath: /etc/vikunja/config.yml
                          subPath: config.yml
                          readOnly: true
                        # FullInit also initialises the file-storage handler,
                        # which must be able to create its basepath. The server
                        # gets this from its data PVC; give the short-lived Job a
                        # throwaway writable dir (nothing is actually stored).
                        - name: files
                          mountPath: /app/vikunja/files
                  volumes:
                    - name: shared
                      emptyDir: {}
                    - name: config
                      configMap:
                        name: vikunja-config
                    - name: files
                      emptyDir: {}
