apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2
  source:
    # go-vikunja/helm-chart vendored from git (v2.0.2) into vendored/vikunja/base
    # with its bjw-s `common` dependency built into charts/ (see vendir.yml), so
    # ArgoCD renders it offline. OCI publishing stalled at chart 2.0.0; git tags
    # stay current. The Vikunja app version is set by vikunja.image.tag below,
    # not the chart's appVersion.
    repoURL: ssh://git@github.com/nijave/vmubtkube-a.git
    path: vendored/vikunja/base
    targetRevision: HEAD
    helm:
      releaseName: vikunja
      valuesObject:
        vikunja:
          image:
            # bjw-s common renders <repository>:<tag> and ignores the `registry`
            # key, so `repository` carries the full mirror path. The
            # `registry`+`tag` siblings exist so .ci/mirror-images.sh (which
            # greps sibling registry/tag maps) and Renovate's regex manager
            # resolve the upstream docker.io/vikunja/vikunja.
            repository: registry.apps.nickv.me/vikunja/vikunja
            # renovate: datasource=docker depName=vikunja/vikunja
            registry: registry.apps.nickv.me/vikunja/vikunja
            tag: "2.4.0"
          # This cluster routes through Contour HTTPProxy, not the chart's
          # nginx-oriented Ingress. Expose vikunja separately (and set
          # service.publicurl in the config below) when adding routing.
          ingress:
            main:
              enabled: false
          persistence:
            # Holds task attachments, avatars, project backgrounds and data
            # exports — required even with an external database. Backed up via
            # volsync (see vikunja.yaml).
            data:
              enabled: true
              accessMode: ReadWriteOnce
              size: 5Gi
            # SQLite DB PVC — unused with the external cnpg Postgres wired below.
            database:
              enabled: false
            # cnpg's self-signed cluster CA. Mount only ca.crt — the default-ca
            # secret also holds the private ca.key.
            pgca:
              enabled: true
              type: secret
              name: default-ca
              mountPath: /etc/vikunja/pgca
              readOnly: true
              items:
                - key: ca.crt
                  path: ca.crt
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          configMaps:
            config:
              enabled: true
              data:
                config.yml: |
                  # https://vikunja.io/docs/config-options/
                  service:
                    # Set to the public URL once vikunja is exposed via an
                    # HTTPProxy (e.g. https://vikunja.apps.somemissing.info).
                    publicurl:
          env:
            VIKUNJA_DATABASE_TYPE: postgres
            VIKUNJA_DATABASE_HOST: default-rw.default.svc.cluster.local
            VIKUNJA_DATABASE_USER: vikunja
            VIKUNJA_DATABASE_NAME: vikunja
            VIKUNJA_DATABASE_SSLMODE: verify-full
            VIKUNJA_DATABASE_SSLROOTCERT: /etc/vikunja/pgca/ca.crt
            VIKUNJA_DATABASE_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-vikunja-user
                  key: password
