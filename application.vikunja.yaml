apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2
  source:
    # go-vikunja/helm-chart vendored from git (v2.0.2) into vendored/vikunja/base
    # with its bjw-s `common` dependency built into charts/ (see vendir.yml), so
    # ArgoCD renders it offline. OCI publishing stalled at chart 2.0.0; git tags
    # stay current. The Vikunja app version is set by vikunja.image.tag below,
    # not the chart's appVersion.
    repoURL: ssh://git@github.com/nijave/vmubtkube-a.git
    path: vendored/vikunja/base
    targetRevision: HEAD
    helm:
      releaseName: vikunja
      valuesObject:
        vikunja:
          image:
            # bjw-s common renders <repository>:<tag> and ignores the `registry`
            # key, so `repository` carries the full mirror path. The
            # `registry`+`tag` siblings exist so .ci/mirror-images.sh (which
            # greps sibling registry/tag maps) and Renovate's regex manager
            # resolve the upstream docker.io/vikunja/vikunja.
            repository: registry.apps.nickv.me/vikunja/vikunja
            # renovate: datasource=docker depName=vikunja/vikunja
            registry: registry.apps.nickv.me/vikunja/vikunja
            tag: "2.4.0"
          # Exposed via an external-dns annotation on the chart's ClusterIP
          # Service (service.main below) rather than the chart's
          # nginx-oriented Ingress or a Contour HTTPProxy; the cluster Service
          # network is LAN-routable, matching the prowlarr/sonarr pattern.
          ingress:
            main:
              enabled: false
          service:
            main:
              # external-dns publishes an A record (vikunja.k8s.somemissing.info)
              # for the ClusterIP. Front the container's 3456 with port 80 so the
              # public URL needs no port suffix.
              annotations:
                external-dns.alpha.kubernetes.io/hostname: vikunja.k8s.somemissing.info
              ports:
                http:
                  port: 80
                  targetPort: 3456
          persistence:
            # Holds task attachments, avatars, project backgrounds and data
            # exports — required even with an external database. Backed up via
            # volsync (see vikunja.yaml).
            data:
              enabled: true
              accessMode: ReadWriteOnce
              size: 5Gi
            # SQLite DB PVC — unused with the external cnpg Postgres wired below.
            database:
              enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          configMaps:
            config:
              enabled: true
              data:
                config.yml: |
                  # https://vikunja.io/docs/config-options/
                  service:
                    # Must match the external-dns hostname on service.main above.
                    # Plain HTTP: traffic reaches the ClusterIP directly with no
                    # TLS-terminating proxy in front.
                    publicurl: http://vikunja.k8s.somemissing.info
          env:
            VIKUNJA_DATABASE_TYPE: postgres
            VIKUNJA_DATABASE_HOST: default-rw.default.svc.cluster.local
            VIKUNJA_DATABASE_USER: vikunja
            VIKUNJA_DATABASE_NAME: vikunja
            # In-cluster traffic to cnpg is plaintext.
            VIKUNJA_DATABASE_SSLMODE: disable
            VIKUNJA_DATABASE_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-vikunja-user
                  key: password
