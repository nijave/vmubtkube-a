apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hyperdx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: hyperdx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
  source:
    chart: clickstack
    repoURL: https://hyperdxio.github.io/helm-charts
    targetRevision: 1.1.1
    helm:
      releaseName: hyperdx
      valuesObject:
        global:
          storageClassName: zfs-generic-iscsi-csi
        clickhouse:
          enabled: false
        mongodb:
          enabled: false
        hyperdx:
          appUrl: http://hyperdx.k8s.somemissing.info
          appPort: 3000
          apiKey: c58fcf6d-fda1-4100-bbba-3ef6ceed8a7f
          service:
            type: ClusterIP
          useExistingConfigSecret: true
          existingConfigSecret: hyperdx-clickstack-config
          existingConfigConnectionsKey: connections.json
          existingConfigSourcesKey: sources.json
          # Point app at our hand-written collector (chart's is disabled below)
          otelExporterEndpoint: http://hyperdx-otel-collector:4318
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: hyperdx-mongo-app-connection
                  key: connectionString.standard
        # Disable chart's otel-collector — its CLICKHOUSE_PASSWORD is rendered
        # as a plaintext env value, and the `otel.env` append pattern produces
        # duplicate env keys which Argo's SSA diff rejects. We run our own
        # Deployment below with a single secretKeyRef entry.
        otel:
          enabled: false
        ingress:
          enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: hyperdx-app
  namespace: hyperdx
  annotations:
    external-dns.alpha.kubernetes.io/hostname: hyperdx.k8s.somemissing.info
spec:
  type: ClusterIP
  ports:
  - name: app
    port: 80
    protocol: TCP
    targetPort: 3000
  selector:
    app: hyperdx-clickstack
    app.kubernetes.io/instance: hyperdx
    app.kubernetes.io/name: clickstack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hyperdx-config-renderer
  namespace: hyperdx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hyperdx-config-renderer
  namespace: hyperdx
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hyperdx-config-renderer
  namespace: hyperdx
subjects:
  - kind: ServiceAccount
    name: hyperdx-config-renderer
    namespace: hyperdx
roleRef:
  kind: Role
  name: hyperdx-config-renderer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperdx-config-render
  namespace: hyperdx
data:
  render.sh: |
    #!/bin/sh
    set -eu
    : "${CH_PASSWORD:?}"

    CONNECTIONS=$(cat <<JSON
    [
      {
        "name": "Local ClickHouse",
        "host": "http://clickhouse-hyperdx:8123",
        "port": 8123,
        "username": "app",
        "password": "${CH_PASSWORD}"
      }
    ]
    JSON
    )

    SOURCES=$(cat <<'JSON'
    [
      {
        "from": { "databaseName": "otel", "tableName": "otel_logs" },
        "kind": "log",
        "timestampValueExpression": "TimestampTime",
        "name": "Logs",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "Body",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "Body",
        "eventAttributesExpression": "LogAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
        "severityTextExpression": "SeverityText",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "connection": "Local ClickHouse",
        "traceSourceId": "Traces",
        "sessionSourceId": "Sessions",
        "metricSourceId": "Metrics"
      },
      {
        "from": { "databaseName": "otel", "tableName": "otel_traces" },
        "kind": "trace",
        "timestampValueExpression": "Timestamp",
        "name": "Traces",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "SpanName",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "SpanName",
        "eventAttributesExpression": "SpanAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "durationExpression": "Duration",
        "durationPrecision": 9,
        "parentSpanIdExpression": "ParentSpanId",
        "spanNameExpression": "SpanName",
        "spanKindExpression": "SpanKind",
        "statusCodeExpression": "StatusCode",
        "statusMessageExpression": "StatusMessage",
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "sessionSourceId": "Sessions",
        "metricSourceId": "Metrics"
      },
      {
        "from": { "databaseName": "otel", "tableName": "" },
        "kind": "metric",
        "timestampValueExpression": "TimeUnix",
        "name": "Metrics",
        "resourceAttributesExpression": "ResourceAttributes",
        "metricTables": {
          "gauge": "otel_metrics_gauge",
          "histogram": "otel_metrics_histogram",
          "sum": "otel_metrics_sum"
        },
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "traceSourceId": "Traces",
        "sessionSourceId": "Sessions"
      },
      {
        "from": { "databaseName": "otel", "tableName": "hyperdx_sessions" },
        "kind": "session",
        "timestampValueExpression": "TimestampTime",
        "name": "Sessions",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "Body",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "Body",
        "eventAttributesExpression": "LogAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
        "severityTextExpression": "SeverityText",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "traceSourceId": "Traces",
        "metricSourceId": "Metrics"
      }
    ]
    JSON
    )

    kubectl -n hyperdx create secret generic hyperdx-clickstack-config \
      --from-literal=connections.json="$CONNECTIONS" \
      --from-literal=sources.json="$SOURCES" \
      --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hyperdx-config-render
  namespace: hyperdx
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: hyperdx-config-renderer
      restartPolicy: OnFailure
      containers:
        - name: render
          image: bitnamilegacy/kubectl:1.33.4
          command: ["/bin/sh", "/render/render.sh"]
          env:
            - name: CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-app-credentials
                  key: password
          volumeMounts:
            - name: render
              mountPath: /render
      volumes:
        - name: render
          configMap:
            name: hyperdx-config-render
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperdx-otel-collector
  namespace: hyperdx
  labels:
    app: hyperdx-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperdx-otel-collector
  template:
    metadata:
      labels:
        app: hyperdx-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: docker.hyperdx.io/hyperdx/hyperdx-otel-collector:2.23.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 13133
            - name: fluentd
              containerPort: 24225
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
          env:
            - name: CLICKHOUSE_ENDPOINT
              value: "tcp://clickhouse-hyperdx:9000?dial_timeout=10s"
            - name: CLICKHOUSE_SERVER_ENDPOINT
              value: "clickhouse-hyperdx:9000"
            - name: CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT
              value: "clickhouse-hyperdx:9363"
            - name: OPAMP_SERVER_URL
              value: "http://hyperdx-clickstack-app:4320"
            - name: HYPERDX_LOG_LEVEL
              value: info
            - name: HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE
              value: otel
            - name: HYPERDX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hyperdx-clickstack-app-secrets
                  key: api-key
            - name: CLICKHOUSE_USER
              value: app
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-app-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hyperdx-otel-collector
  namespace: hyperdx
  labels:
    app: hyperdx-otel-collector
spec:
  type: ClusterIP
  selector:
    app: hyperdx-otel-collector
  ports:
    - name: health
      port: 13133
      targetPort: health
    - name: fluentd
      port: 24225
      targetPort: fluentd
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8888
      targetPort: metrics
