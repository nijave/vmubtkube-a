apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-apps-somemissing-info-cert
  namespace: argocd
spec:
  secretName: argocd-apps-somemissing-info-tls
  issuerRef:
    name: cert-manager-webhook-dnsimple-production
    kind: ClusterIssuer
  commonName: &cn argocd.apps.somemissing.info
  dnsNames:
    - *cn
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: argocd-webhook
  namespace: argocd
spec:
  virtualhost:
    fqdn: argocd.apps.somemissing.info
    tls:
      secretName: argocd-apps-somemissing-info-tls
  routes:
    - conditions:
        - prefix: /api/webhook
      services:
        - name: argocd-server
          port: 443
          protocol: tls
---
# Serving cert for argocd-server itself: ArgoCD watches the argocd-server-tls
# secret and hot-reloads it in place of its generated self-signed cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-cert
  namespace: argocd
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: cert-manager-webhook-dnsimple-production
    kind: ClusterIssuer
  commonName: &cn argocd.k8s.somemissing.info
  dnsNames:
    - *cn
    - argocd.apps.somemissing.info
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: webhook.github.secret
    argocd.argoproj.io/sync-options: Prune=false,ServerSideApply=true
    argocd.argoproj.io/compare-options: IgnoreExtraneous
