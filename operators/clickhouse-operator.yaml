apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clickhouse-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: clickhouse-operator-altinity-clickhouse-operator
    namespace: operators
    managedFieldsManagers:
    - clickhouse-operator
  source:
    chart: altinity-clickhouse-operator
    repoURL: https://helm.altinity.com
    targetRevision: 0.26.2
    helm:
      releaseName: clickhouse-operator
      valuesObject:
        crdHook:
          enabled: false
