apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: clickhouse-app-credentials
  namespace: hyperdx
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
stringData:
  username: app
---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: clickhouse-otelcollector-credentials
  namespace: hyperdx
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
stringData:
  username: otelcollector
---
apiVersion: clickhouse-keeper.altinity.com/v1
kind: ClickHouseKeeperInstallation
metadata:
  name: hyperdx
  namespace: hyperdx
spec:
  configuration:
    clusters:
      - name: keeper
        layout:
          replicasCount: 3
    settings:
      logger/level: information
      logger/console: "true"
      listen_host: "0.0.0.0"
      keeper_server/four_letter_word_white_list: "*"
      keeper_server/coordination_settings/raft_logs_level: information
      prometheus/endpoint: /metrics
      prometheus/port: "7000"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
  defaults:
    templates:
      podTemplate: default
      dataVolumeClaimTemplate: default
      serviceTemplate: keeper-service
  templates:
    serviceTemplates:
      - name: keeper-service
        generateName: keeper-{chk}
        spec:
          ports:
            - name: client
              port: 2181
            - name: raft
              port: 9444
            - name: metrics
              port: 7000
          type: ClusterIP
    podTemplates:
      - name: default
        metadata:
          labels:
            app: clickhouse-keeper
        spec:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: clickhouse-keeper
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: clickhouse-keeper
              image: clickhouse/clickhouse-keeper:25.12-alpine
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
    volumeClaimTemplates:
      - name: default
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: zfs-generic-iscsi-csi
          resources:
            requests:
              storage: 10Gi
---
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: hyperdx
  namespace: hyperdx
spec:
  defaults:
    templates:
      podTemplate: clickhouse
      dataVolumeClaimTemplate: data
      logVolumeClaimTemplate: logs
      replicaServiceTemplate: clickhouse-replica-service
  configuration:
    zookeeper:
      nodes:
        - host: keeper-hyperdx
          port: 2181
    users:
      app/password:
        valueFrom:
          secretKeyRef:
            name: clickhouse-app-credentials
            key: password
      app/networks/ip:
        - 127.0.0.1/32
        - 192.168.224.0/20
      app/profile: default
      app/quota: default
      app/access_management: "1"
      app/named_collection_control: "1"
      app/show_named_collections: "1"
      app/show_named_collections_secrets: "1"
      otelcollector/password:
        valueFrom:
          secretKeyRef:
            name: clickhouse-otelcollector-credentials
            key: password
      otelcollector/networks/ip:
        - 127.0.0.1/32
        - 192.168.224.0/20
      otelcollector/profile: default
      otelcollector/quota: default
    profiles:
      default/allow_experimental_database_replicated: "1"
      default/allow_experimental_object_type: "1"
      default/distributed_ddl_entry_format_version: "5"
    settings:
      prometheus/endpoint: /metrics
      prometheus/port: "9363"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
    clusters:
      - name: replicated
        layout:
          shardsCount: 1
          replicasCount: 2
  templates:
    serviceTemplates:
      - name: clickhouse-replica-service
        generateName: chi-{chi}-{cluster}-{shard}-{replica}
        spec:
          ports:
            - name: http
              port: 8123
            - name: tcp
              port: 9000
            - name: interserver
              port: 9009
            - name: metrics
              port: 9363
          clusterIP: None
          type: ClusterIP
    podTemplates:
      - name: clickhouse
        spec:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        clickhouse.altinity.com/chi: hyperdx
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:25.12-alpine
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  memory: 8Gi
    volumeClaimTemplates:
      - name: data
        reclaimPolicy: Retain
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: zfs-generic-iscsi-csi
          resources:
            requests:
              storage: 250Gi
      - name: logs
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: zfs-generic-iscsi-csi
          resources:
            requests:
              storage: 20Gi
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse-hyperdx
  namespace: hyperdx
  labels:
    release: prom
spec:
  selector:
    matchLabels:
      clickhouse.altinity.com/chi: hyperdx
      clickhouse.altinity.com/Service: host
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - action: replace
          separator: /
          sourceLabels:
            - namespace
            - pod
          targetLabel: instance
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse-keeper-hyperdx
  namespace: hyperdx
  labels:
    release: prom
spec:
  selector:
    matchLabels:
      clickhouse-keeper.altinity.com/chk: hyperdx
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - action: replace
          separator: /
          sourceLabels:
            - namespace
            - pod
          targetLabel: instance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-schema-seed
  namespace: hyperdx
data:
  seed.sh: |
    #!/bin/sh
    set -eu

    SQL_REF="${SQL_REF:?}"
    DATABASE="${DATABASE:?}"
    TABLES_TTL="${TABLES_TTL:?}"
    CH_HOST="${CH_HOST:?}"
    CH_REPLICAS="${CH_REPLICAS:?}"

    # Wait for every replica to be reachable so the Replicated DB engine
    # can propagate DDL to the full cluster on the first attempt.
    for host in $CH_REPLICAS; do
      until clickhouse-client --host "$host" --user "$CLICKHOUSE_USER" --password "$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null 2>&1; do
        echo "waiting for $host..."
        sleep 3
      done
      echo "$host ready"
    done

    clickhouse-client --host "$CH_HOST" --user "$CLICKHOUSE_USER" --password "$CLICKHOUSE_PASSWORD" \
      --query "CREATE DATABASE IF NOT EXISTS $DATABASE ENGINE = Replicated('/clickhouse/databases/$DATABASE', '{shard}', '{replica}')"

    BASE_URL="https://raw.githubusercontent.com/hyperdxio/hyperdx/${SQL_REF}/docker/otel-collector/schema/seed"
    for f in 00002_otel_logs.sql 00003_otel_metrics.sql 00004_hyperdx_sessions.sql 00005_otel_traces.sql; do
      echo "applying $f"
      wget -qO- "$BASE_URL/$f" \
        | sed -e "s|\${DATABASE}|$DATABASE|g" \
              -e "s|\${TABLES_TTL}|$TABLES_TTL|g" \
              -e 's|ENGINE = MergeTree|ENGINE = ReplicatedMergeTree|g' \
        | clickhouse-client --host "$CH_HOST" --user "$CLICKHOUSE_USER" --password "$CLICKHOUSE_PASSWORD" --multiquery
    done

    # The OTel ClickHouse exporter creates these auxiliary trace lookup
    # objects on first write; pre-create them as Replicated so the
    # exporter's CREATE IF NOT EXISTS becomes a no-op.
    clickhouse-client --host "$CH_HOST" --user "$CLICKHOUSE_USER" --password "$CLICKHOUSE_PASSWORD" --multiquery <<SQL
    CREATE TABLE IF NOT EXISTS $DATABASE.otel_traces_trace_id_ts (
      TraceId String CODEC(ZSTD(1)),
      Start DateTime CODEC(Delta(4), ZSTD(1)),
      End DateTime CODEC(Delta(4), ZSTD(1)),
      INDEX idx_trace_id TraceId TYPE bloom_filter(0.01) GRANULARITY 1
    ) ENGINE = ReplicatedMergeTree
    PARTITION BY toDate(Start)
    ORDER BY (TraceId, Start)
    TTL toDateTime(Start) + $TABLES_TTL
    SETTINGS index_granularity = 8192, ttl_only_drop_parts = 1;

    CREATE MATERIALIZED VIEW IF NOT EXISTS $DATABASE.otel_traces_trace_id_ts_mv
    TO $DATABASE.otel_traces_trace_id_ts
    AS SELECT TraceId, min(Timestamp) AS Start, max(Timestamp) AS End
    FROM $DATABASE.otel_traces
    WHERE TraceId != ''
    GROUP BY TraceId;
    SQL

    echo "schema seed complete"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-schema-seed
  namespace: hyperdx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: clickhouse/clickhouse-server:25.12-alpine
          command: ["/bin/sh", "/seed/seed.sh"]
          env:
            - name: SQL_REF
              value: "@hyperdx/otel-collector@2.23.1"
            - name: DATABASE
              value: otel
            - name: TABLES_TTL
              value: toIntervalDay(30)
            - name: CH_HOST
              value: clickhouse-hyperdx
            - name: CH_REPLICAS
              value: chi-hyperdx-replicated-0-0 chi-hyperdx-replicated-0-1
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-app-credentials
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-app-credentials
                  key: password
          volumeMounts:
            - name: seed
              mountPath: /seed
      volumes:
        - name: seed
          configMap:
            name: clickhouse-schema-seed
