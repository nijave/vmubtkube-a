apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 250Gi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
  source:
    repoURL: ghcr.io/immich-app/immich-charts
    chart: immich
    targetRevision: 0.11.1
    helm:
      releaseName: immich
      valuesObject:
        common:
          controllers:
            main:
              containers:
                main:
                  envFrom:
                    - secretRef:
                        name: immich-postgres
        controllers:
          main:
            containers:
              main:
                image:
                  tag: v2.5.6
                resources:
                  requests:
                    cpu: 50m
        immich:
          metrics:
            enabled: true
          persistence:
            library:
              existingClaim: immich
        valkey:
          enabled: true
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: docker.io/valkey/valkey
                    tag: 9.1-alpine@sha256:355ae2c6c965769a0d9b9810711e6befd5b79fe676d1faa848247733ad6a4408
                    pullPolicy: IfNotPresent
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich
  namespace: immich
  labels:
    release: prom
spec:
  jobLabel: immich-server
  namespaceSelector:
    matchNames:
      - immich
  selector:
    matchLabels:
      app.kubernetes.io/instance: immich
      app.kubernetes.io/name: server
      app.kubernetes.io/service: immich-server
  endpoints:
    - port: metrics-api
      scheme: http
    - port: metrics-ms
      scheme: http
