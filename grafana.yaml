apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-k8s-somemissing-info-cert
  namespace: monitoring
spec:
  secretName: grafana-k8s-somemissing-info-tls
  issuerRef:
    name: cert-manager-webhook-dnsimple-production
    kind: ClusterIssuer
  commonName: &cn grafana.k8s.somemissing.info
  dnsNames:
    - *cn
