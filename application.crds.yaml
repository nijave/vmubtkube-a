apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crds
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
  source:
    # external-secrets CRDs, vendored via vendir from external-secrets/external-secrets
    # git ref (must track the chart version in application.external-secrets.yaml).
    # App identity unchanged from the old crds/ source on purpose: repointing in
    # place avoids a delete+recreate that would cascade-delete this CRD via the
    # finalizer below.
    path: vendored/external-secrets-crds/base
    repoURL: ssh://git@github.com/nijave/vmubtkube-a.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      # Never cascade-delete CRDs — removing them wipes every ExternalSecret
      # instance's stored data.
      prune: false
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2