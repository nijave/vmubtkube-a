apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-database
  namespace: hyperdx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-database
  namespace: hyperdx
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods]
    verbs: [patch, delete, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-database
  namespace: hyperdx
subjects:
  - kind: ServiceAccount
    name: mongodb-database
    namespace: hyperdx
roleRef:
  kind: Role
  name: mongodb-database
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: hyperdx-mongo-app-credentials
  namespace: hyperdx
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "48"
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: hyperdx
  namespace: hyperdx
spec:
  members: 3
  type: ReplicaSet
  version: "8.0.4"
  security:
    authentication:
      modes:
        - SCRAM
  users:
    - name: hyperdx
      db: admin
      passwordSecretRef:
        name: hyperdx-mongo-app-credentials
        key: password
      roles:
        - name: readWrite
          db: hyperdx
        - name: clusterMonitor
          db: admin
      scramCredentialsSecretName: hyperdx-mongo-app-scram
      connectionStringSecretName: hyperdx-mongo-app-connection
  statefulSet:
    spec:
      template:
        spec:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: hyperdx-svc
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: mongod
              # Workaround for MongoDB 8.x crash on Linux kernel >= 6.17:
              # tcmalloc per-CPU caches via rseq corrupt memory across threads.
              # See https://www.mongodb.com/community/forums/t/mongodb-8-x-and-linux-kernel-6-19/337547
              env:
                - name: GLIBC_TUNABLES
                  value: glibc.pthread.rseq=0
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
            - name: mongodb-exporter
              image: percona/mongodb_exporter:0.50.0
              args:
                - --collect-all
                - --compatible-mode
                - --discovering-mode
                - --web.listen-address=:9216
              env:
                - name: MONGODB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: hyperdx-mongo-app-credentials
                      key: password
                - name: MONGODB_URI
                  value: mongodb://hyperdx:$(MONGODB_PASSWORD)@127.0.0.1:27017/?authSource=admin&directConnection=true
              ports:
                - name: metrics
                  containerPort: 9216
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 256Mi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: zfs-generic-iscsi-csi
            resources:
              requests:
                storage: 20Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: zfs-generic-iscsi-csi
            resources:
              requests:
                storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hyperdx-mongo-metrics
  namespace: hyperdx
  labels:
    app: hyperdx-mongo-metrics
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: hyperdx-svc
  ports:
    - name: metrics
      port: 9216
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-hyperdx
  namespace: hyperdx
  labels:
    release: prom
spec:
  selector:
    matchLabels:
      app: hyperdx-mongo-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - action: replace
          separator: /
          sourceLabels:
            - namespace
            - pod
          targetLabel: instance
