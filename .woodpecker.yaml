# Mirrors images referenced as registry.apps.nickv.me/<path>:<tag> from their
# upstream registries. See .ci/mirror-images.sh for the mapping logic; upstream
# coordinates come entirely from renovate.json (registryAliases, packageRules,
# ignoreDeps), so the mirror path must equal the upstream repo path.
#
# Runs on PRs so Renovate's tag bumps mirror the new image before merge, and on
# push to main as a self-healing backstop (re-mirrors anything missing).
#
# Step DAG (depends_on): validate, validate-pluto, and validate-helm run in
# parallel from the start; vendir-sync waits for the steps that read
# vendored/ (it rewrites those files in the shared workspace); mirror-images
# waits for vendir-sync (it git-diffs the same workspace).
clone:
  git:
    # renovate: datasource=docker depName=woodpeckerci/plugin-git
    image: woodpeckerci/plugin-git:2.9.2
    settings:
      partial: false
      # Shallow clone of HEAD's recent history. mirror-images.sh fetches the
      # target branch separately to compute diffs; if a long-lived PR's
      # merge-base falls outside these depths, the script's explicit git-diff
      # check will fail loudly rather than silently producing empty mirror sets.
      depth: 25

when:
  - event: pull_request
  - event: push
    branch: main

steps:
  validate:
    # renovate: datasource=docker depName=alpine/k8s
    image: alpine/k8s:1.36.2
    environment:
      # renovate: datasource=github-releases depName=yannh/kubeconform
      KUBECONFORM_VERSION: v0.8.0
    commands:
      - wget -qO- "https://github.com/yannh/kubeconform/releases/download/$KUBECONFORM_VERSION/kubeconform-linux-amd64.tar.gz" | tar xz -C /usr/local/bin kubeconform
      - sh .ci/validate.sh

  validate-pluto:
    # renovate: datasource=docker depName=alpine/k8s
    image: alpine/k8s:1.36.2
    environment:
      # renovate: datasource=github-releases depName=FairwindsOps/pluto
      PLUTO_VERSION: v5.24.0
    commands:
      - wget -qO- "https://github.com/FairwindsOps/pluto/releases/download/$PLUTO_VERSION/pluto_$${PLUTO_VERSION#v}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin pluto
      - sh .ci/validate-pluto.sh

  validate-helm:
    # renovate: datasource=docker depName=alpine/k8s
    image: alpine/k8s:1.36.2
    when:
      - event: pull_request
        path:
          - "application.*.yaml"
          - ".ci/validate-helm.sh"
    environment:
      # renovate: datasource=github-releases depName=yannh/kubeconform
      KUBECONFORM_VERSION: v0.8.0
      # renovate: datasource=github-releases depName=FairwindsOps/pluto
      PLUTO_VERSION: v5.24.0
    commands:
      - wget -qO- "https://github.com/yannh/kubeconform/releases/download/$KUBECONFORM_VERSION/kubeconform-linux-amd64.tar.gz" | tar xz -C /usr/local/bin kubeconform
      - wget -qO- "https://github.com/FairwindsOps/pluto/releases/download/$PLUTO_VERSION/pluto_$${PLUTO_VERSION#v}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin pluto
      - sh .ci/validate-helm.sh

  vendir-sync:
    # renovate: datasource=docker depName=alpine/k8s
    image: alpine/k8s:1.36.2
    # No `when:` filter: mirror-images depends_on this step, and Woodpecker
    # rejects a DAG whose dependency is filtered out by conditions. The
    # equivalent gating (PR event + vendir file changes) lives in the script.
    depends_on: [validate, validate-pluto]
    environment:
      # renovate: datasource=github-releases depName=carvel-dev/vendir
      VENDIR_VERSION: v0.46.0
      # Write-access GitHub deploy key for pushing sync results back to the
      # PR branch. Woodpecker repo secret scoped to this image + pull_request.
      VENDIR_PUSH_SSH_KEY:
        from_secret: vendir_push_ssh_key
    commands:
      - wget -qO /usr/local/bin/vendir "https://github.com/carvel-dev/vendir/releases/download/$VENDIR_VERSION/vendir-linux-amd64"
      - chmod +x /usr/local/bin/vendir
      - sh .ci/vendir-sync.sh

  mirror-images:
    # renovate: datasource=docker depName=ghcr.io/regclient/regctl
    image: ghcr.io/regclient/regctl:v0.11.5-alpine
    depends_on: [vendir-sync]
    backend_options:
      kubernetes:
        hostUsers: false
        # regclient image runs as non-root; need root to apk add yq/jq.
        securityContext:
          runAsUser: 0
          runAsGroup: 0
    commands:
      - apk add --no-cache yq jq git
      - sh .ci/mirror-images.sh
