apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    - CreateNamespace=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 87.17.0
    helm:
      releaseName: prom
      valuesObject:
        nameOverride: kp
        grafana:
          env:
            GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS: otel-collector.k8s.somemissing.info:4317
            GF_TRACING_OPENTELEMETRY_OTLP_PROPAGATION: w3c
          grafana.ini:
            server:
              protocol: https
              domain: grafana.k8s.somemissing.info
              root_url: https://grafana.k8s.somemissing.info/
              cert_file: /etc/grafana/tls/tls.crt
              cert_key: /etc/grafana/tls/tls.key
              certs_watch_interval: 1h
          useStatefulSet: true
          service:
            port: 443
            portName: https-web
            appProtocol: https
            annotations:
              external-dns.alpha.kubernetes.io/hostname: grafana.k8s.somemissing.info
          serviceMonitor:
            interval: 30s
            scheme: https
            tlsConfig:
              serverName: grafana.k8s.somemissing.info
            scrapeTimeout: 30s
          extraSecretMounts:
            - name: grafana-tls
              secretName: grafana-k8s-somemissing-info-tls
              defaultMode: 420
              mountPath: /etc/grafana/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /api/health
              port: grafana
              scheme: HTTPS
            initialDelaySeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          persistence:
            enabled: true
            storageClassName: zfs-generic-iscsi-csi
          initChownData:
            enabled: false
          sidecar:
            dashboards:
              reloadURL: https://grafana.k8s.somemissing.info/api/admin/provisioning/dashboards/reload
            datasources:
              reloadURL: https://grafana.k8s.somemissing.info/api/admin/provisioning/datasources/reload
              url: http://thanos-query.thanos.svc.cluster.local.:9090
              timeout: 300
              jsonData:
                customQueryParameters: max_source_resolution=1h
                cacheLevel: Medium
                prometheusType: "Thanos"
                prometheusVersion: "0.41.0"
                queryTimeout: "300s"
          additionalDataSources:
          - name: prometheus_vmubtkube-a
            type: prometheus
            url: http://{{ printf "%s-kp-prometheus.monitoring.svc" .Release.Name }}:9090
        prometheusOperator:
          verticalPodAutoscaler:
            enabled: true
        kube-state-metrics:
          replicas: 2
        additionalPrometheusRulesMap:
          blackbox-exporter-alerts:
            groups:
            - name: ./smoke-test.rules
              rules:
              - alert: BlackboxServiceProbeFailing
                expr: max by (instance, target) (probe_success) != 1
                for: 10m
                annotations:
                  summary: A service is failing blackbox probing.
            - name: ./certificates.rules
              rules:
              - alert: CertificatesNearExpiry
                expr: |
                  ( probe_ssl_last_chain_expiry_timestamp_seconds - time() ) / 60 / 60 / 24 < 30
                for: 5m
                annotations:
                  summary: Certificates are nearing expiration.
          deluge:
            groups:
            - name: ./deluge.rules
              rules:
              - alert: TooManyPausedTorrents
                expr: |
                  max(deluge_torrents{state="paused"}) / max(deluge_torrents{state="total"}) > 0.25
                for: 10m
                annotations:
                  summary: Too many torrents are paused at the same time.
          frigate:
            groups:
            - name: ./frigate.rules
              rules:
              - alert: FrigateNotProcessing
                expr: |
                  sum by (instance) (frigate_process_fps) < 1
                for: 5m
                annotations:
                  summary: Frigate doesn't appear to be doing any work.
              - alert: FrigateLowEventRate
                expr: |
                  sum(rate(frigate_camera_events_total[1h])) < 5
                for: 1h
                annotations:
                  summary: Frigate camera event rate is unusually low.
        prometheus:
          service:
            annotations:
              external-dns.alpha.kubernetes.io/hostname: prometheus.k8s.somemissing.info
          prometheusSpec:
            replicas: 2
            # `hard` = requiredDuringScheduling on hostname; with 8 nodes and 2
            # replicas this guarantees they land on separate hosts so a single
            # node failure can't take both Prometheus instances offline.
            podAntiAffinity: hard
            prometheusExternalLabelNameClear: true
            # Each Prometheus replica gets a distinct prometheus_replica label
            # so Thanos Query/Compactor can dedupe identical samples at read
            # and compaction time (Thanos Compactor is configured with
            # --deduplication.replica-label=prometheus_replica).
            replicaExternalLabelName: prometheus_replica
            externalLabels:
              cluster: vmubtkube-a
              prometheus: vmubtkube-a
            tracingConfig:
              clientType: grpc
              endpoint: otel-collector.k8s.somemissing.info:4317
              insecure: false
            retention: 7d
            retentionSize: 15GB
            scrapeInterval: 15s
            remoteWrite:
            - url: http://thanos-receive-router.thanos.svc.cluster.local.:19291/api/v1/receive
              # remoteTimeout: 90s
              remoteTimeout: 300s
              # writeRelabelConfigs:
              #   - sourceLabels: ["__name__"]
              #     targetLabel: cluster
              #     replacement: vmubtkube-a
              headers:
                THANOS-TENANT: vmubtkube-a
              metadataConfig:
                send: false
              sendNativeHistograms: true
              queueConfig:
                batchSendDeadline: 30s
                # maxSamplesPerSend: 5000
                maxSamplesPerSend: 2500
                minBackoff: 25ms
                maxBackoff: 500ms
                retryOnRateLimit: true
                sampleAgeLimit: 5m
              writeRelabelConfigs:
                - action: replace
                  sourceLabels: [pod, server, job]
                  targetLabel: job
                  # Require ; and at least 1 other character (both pod and server can't be empty)
                  regex: '.{2,};minio|scrapeConfig/minio-tenant/minio.*'
                  replacement: minio-default-minio-job
                # Reduce Thanos Receive cardinality (~22% of stored series).
                # Dropped from long-term storage only: local Prometheus keeps
                # 7d of everything, so alerts and recording rules (including
                # the apiserver SLO rules built on _bucket series) still
                # evaluate normally and their aggregated outputs are written
                # through to Thanos.
                # apiserver/etcd classic-histogram buckets: keep _sum/_count
                # (average latency survives); per-le percentile detail older
                # than 7d is intentionally sacrificed.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'apiserver_(request_duration_seconds|request_body_size_bytes|request_sli_duration_seconds|response_sizes|watch_cache_read_wait_seconds|watch_list_duration_seconds|watch_events_sizes)_bucket'
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'etcd_request_duration_seconds_bucket'
                # Constant feature-gate flags exported per control-plane
                # process; pure noise in long-term storage.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'kubernetes_feature_enabled'
                # kube-state-metrics per-pod detail with no query/alert use:
                # tolerations is static spec data; status_reason is ~always 0
                # (kube_pod_status_phase covers the useful signal).
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'kube_pod_(tolerations|status_reason)'
                # etcd gRPC method x code explosion. Scoped by job because
                # ArgoCD and Thanos expose the same metric name and those
                # stay. etcd alerting evaluates on local Prometheus.
                - action: drop
                  sourceLabels: [__name__, job]
                  regex: 'grpc_server_handled_total;kube-etcd'
                # Pod ready/scheduled conditions are one-hot encoded (3
                # series per pod: true/false/unknown). condition="true"
                # alone carries the full signal (1=ready, 0=not);
                # false is its complement and unknown is covered by
                # kube_pod_status_phase{phase="Unknown"}.
                - action: drop
                  sourceLabels: [__name__, condition]
                  regex: 'kube_pod_status_(ready|scheduled);(false|unknown)'
                # Controller workqueue latency buckets (apiserver, KCM,
                # scheduler, kubelet, argocd, external-secrets): keep
                # _sum/_count for average latency; per-le percentile
                # detail is not worth ~4k series per family long-term.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'workqueue_(queue|work)_duration_seconds_bucket'
                # Third pass, informed by Grafana Cloud's Kubernetes
                # Monitoring allow lists (grafana/k8s-monitoring-helm
                # allowLists/): metrics their dashboards don't use and
                # nothing here queries. Join/info metrics are deliberately
                # KEPT even though Grafana drops them: kube_replicaset_owner
                # (pod->deployment), node_disk_info (device identity),
                # kube_persistentvolume_{info,claim_ref,capacity_bytes},
                # device_udev_link_info. container_pressure_* (PSI) and
                # container_oom_events_total are also kept intentionally.
                # ReplicaSet spec/status duplicates deployment-level data
                # and churns a full series set on every rollout.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'kube_replicaset_(created|metadata_generation|spec_replicas|status_(replicas|ready_replicas|fully_labeled_replicas|observed_generation|terminating_replicas))'
                # Latency histogram buckets (probe, CRI, CSI ops); _sum and
                # _count siblings are kept for averages.
                - action: drop
                  sourceLabels: [__name__]
                  regex: '(prober_probe_duration_seconds|kubelet_runtime_operations_duration_seconds|storage_operation_duration_seconds)_bucket'
                # cadvisor detail beyond the working-set/usage/fs/network
                # core: memory accounting internals, per-device blkio,
                # process/thread/socket counts, spec mirrors, fs latency
                # internals. container_fs_{reads,writes}(_bytes)_total and
                # container_memory_{working_set,rss,cache,swap} etc stay.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'container_(blkio_device_usage_total|memory_failures_total|memory_max_usage_bytes|memory_failcnt|memory_kernel_usage|memory_total_(active|inactive)_file_bytes|memory_mapped_file|threads|threads_max|sockets|processes|ulimits_soft|cpu_load_d_average_10s|cpu_load_average_10s|cpu_(user|system)_seconds_total|last_seen|start_time_seconds|tasks_state|spec_.*|file_descriptors|fs_(usage_bytes|limit_bytes|inodes_.*|io_.*|read_seconds_total|write_seconds_total|sector_.*|(reads|writes)_merged_total))'
                # node_disk detail: discard/flush/merged/queue-depth counters;
                # core read/write bytes+time and node_disk_info (join) stay.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'node_disk_(discard.*|flush_requests.*|(reads|writes)_merged_total|io_now)'
                # One-hot QoS class (5 series/pod, static) and PV metadata
                # duplicated by kube_persistentvolume_info.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'kube_pod_status_qos_class|kube_persistentvolume_(created|volume_mode)'
                # node-exporter self-telemetry and scheduler/thermal detail.
                - action: drop
                  sourceLabels: [__name__]
                  regex: 'node_(scrape_collector_.*|cpu_scaling_governor|schedstat_.*|cooling_device_.*)'
            resources:
              limits:
                memory: 4Gi
                cpu: 1000m
              requests:
                memory: 3Gi
                cpu: 500m
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 20Gi
                  storageClassName: zfs-generic-iscsi-csi
            scrapeConfigSelector:
              matchLabels:
                release: prom
            additionalScrapeConfigs:
            - job_name: 'deluge'
              static_configs:
              - targets: ['vmcent74deluge.homelab.somemissing.info:9354']
            - job_name: jellyfin
              static_configs:
              - targets: ['jellyfin.apps.somemissing.info:80']
            - job_name: 'opnsense'
              scrape_interval: 10s
              static_configs:
              - targets:
                - 'opnsense.homelab.somemissing.info:9100'
                - 'opnsense.homelab.somemissing.info:9273'
            - job_name: node-exporter
              static_configs:
              - targets: ['vmubttorrent01.homelab.somemissing.info:9100']
            - job_name: minio-hdd
              metrics_path: /minio/metrics/v3
              static_configs:
              - targets:
                  - nas.apps.somemissing.info.:9000
            - job_name: minio-midline
              metrics_path: /minio/metrics/v3
              static_configs:
              - targets:
                  - nas.apps.somemissing.info.:9001
            - job_name: homeassistant
              metrics_path: /api/prometheus
              static_configs:
              - targets:
                - 172.16.2.1:8123
            - job_name: frigate
              metrics_path: /api/metrics
              scheme: https
              static_configs:
              - targets: ['frigate.apps.somemissing.info']
