# Runs the same manifest validation as the CI validate steps (.ci/validate*.sh).
# Setup:   pre-commit install
# Needs:   kubeconform (https://github.com/yannh/kubeconform),
#          pluto (https://github.com/FairwindsOps/pluto), and
#          kustomize or kubectl on PATH.
repos:
  - repo: local
    hooks:
      - id: kubeconform-validate
        name: kubeconform (same as CI validate step)
        entry: env KUBECONFORM_CACHE=.tmp/kubeconform-cache sh .ci/validate.sh
        language: system
        types_or: [yaml]
        pass_filenames: false
      - id: pluto-validate
        name: pluto deprecated-API check (same as CI validate-pluto step)
        entry: sh .ci/validate-pluto.sh
        language: system
        types_or: [yaml]
        pass_filenames: false
      - id: helm-validate
        name: helm render + kubeconform (same as CI validate-helm step)
        entry: env KUBECONFORM_CACHE=.tmp/kubeconform-cache sh .ci/validate-helm.sh
        language: system
        # Chart downloads are slow; only fire when a Helm app (or the script)
        # actually changed — mirrors the CI step's path gate. Needs helm + yq.
        files: ^(application\..*\.yaml|\.ci/validate-helm\.sh)$
        pass_filenames: false
