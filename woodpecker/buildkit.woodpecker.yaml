# Long-lived rootless BuildKit daemon shared by all Woodpecker pipelines.
# Pipeline steps connect via BUILDKIT_HOST=tcp://buildkitd.woodpecker.svc.cluster.local:1234
# and run `buildctl build ...` — no privileged: true, no docker.sock, no host
# access. Image layer cache persists across builds via the cache PVC.
#
# Prereqs the cluster must satisfy (likely already true on this Ubuntu nodepool):
#   - kernel.unprivileged_userns_clone=1 (default on modern kernels)
#   - Pod Security admission for this namespace must allow seccompProfile=Unconfined
#     (the woodpecker namespace has no PSA label set, so this is fine).
---
# buildkitd.toml + the self-signed registry CA, mounted together at
# /etc/buildkit.  The toml's `ca = [...]` path resolves inside that mount.
# Cert source of truth: infra/k8s/registry/registry.crt — keep in sync if
# the registry's cert is ever rotated (it's a 10-year self-signed leaf
# acting as its own CA; expires 2030-11-19).
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: woodpecker
data:
  buildkitd.toml: |
    [registry."registry.apps.nickv.me"]
      ca = ["/etc/buildkit/registry.apps.nickv.me.crt"]
