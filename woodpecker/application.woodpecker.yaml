apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: woodpecker-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: woodpecker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - PruneLast=true
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 2
  source:
    repoURL: ghcr.io/woodpecker-ci/helm
    chart: woodpecker
    targetRevision: 3.6.5
    helm:
      releaseName: woodpecker
      valuesObject:
        server:
          statefulSet:
            replicaCount: 1
          env:
            # GUI / OAuth callback: served by Woodpecker's native TLS listener
            # on :443, exposed by the woodpecker-server-gui Service in
            # proxy_woodpecker_gui.yaml.  Must exactly match the GitHub OAuth
            # App callback URL (https://woodpecker.k8s.somemissing.info/authorize).
            WOODPECKER_HOST: https://woodpecker.k8s.somemissing.info
            # Webhook URL handed to the forge when adding a repo.  Exposed
            # publicly via Contour (proxy_woodpecker_webhook.yaml) so GitHub
            # can deliver pushes; only /api/hook is routed through.
            WOODPECKER_EXPERT_WEBHOOK_HOST: https://woodpecker.apps.somemissing.info
            WOODPECKER_ADMIN: nijave
            WOODPECKER_GITHUB: "true"
            # Enabling these flips the chart's :8000 listener into redirect-only
            # mode and starts the real TLS server on the address below.  The
            # cert/key files come from the mounted
            # woodpecker-k8s-somemissing-info-tls Secret.  Bind is non-privileged
            # (:8443) because the chart runs the container as uid 1000.
            WOODPECKER_SERVER_CERT: /tls/tls.crt
            WOODPECKER_SERVER_KEY: /tls/tls.key
            WOODPECKER_SERVER_ADDR_TLS: ":8443"
            # Forgejo wiring goes here once Forgejo is deployed; remember the
            # forge-blind admin caveat in woodpecker-ci/woodpecker#5798 —
            # pick a Forgejo username you also own on GitHub.
            #
            # WOODPECKER_FORGEJO: "true"
            # WOODPECKER_FORGEJO_URL: http://forgejo-http.forgejo.svc.cluster.local:3000
          createAgentSecret: false
          extraSecretNamesForEnvFrom:
            - woodpecker-server-env
            - woodpecker-github-oauth
            - woodpecker-default-agent-secret
          extraVolumes:
            - name: tls
              secret:
                secretName: woodpecker-k8s-somemissing-info-tls
          extraVolumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          persistentVolume:
            enabled: true
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          metrics:
            enabled: true
            port: 9001
          prometheus:
            podmonitor:
              enabled: true
              interval: 30s
              labels:
                release: prom
            rules:
              enabled: true
              labels:
                release: prom
        agent:
          # Agent image intentionally left at the chart default (docker.io/
          # woodpeckerci/woodpecker-agent at appVersion).  k8s userns support
          # landed upstream in v3.16.0 (woodpecker-ci/woodpecker#6710), so the
          # previous forked registry.apps.nickv.me build is retired and Renovate
          # keeps server + agent in sync via the chart bump.
          replicaCount: 1
          env:
            WOODPECKER_SERVER: woodpecker-server:9000
            WOODPECKER_BACKEND: kubernetes
            WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
            # Workspace PVCs come from the only StorageClass we have,
            # zfs-generic-iscsi-csi (democratic-csi iSCSI), which is
            # ReadWriteOnce.  RWX=false makes Woodpecker request RWO PVCs to
            # match.  All step pods of a workflow share that single workspace
            # PVC, so with RWO they MUST land on one node -- otherwise the
            # second/third parallel step pod hits a "Multi-Attach error" and
            # hangs in ContainerCreating until the holder detaches, which
            # stalls the pipeline long enough for the server to drop the task
            # lease ("queue: task not found") and fail the workflow.
            WOODPECKER_BACKEND_K8S_STORAGE_RWX: "false"
            WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 10G
            # Pin every pod belonging to the same workflow onto one node so the
            # shared RWO workspace volume only ever attaches to a single node.
            # matchLabelKeys keys off woodpecker's per-workflow task-uuid label;
            # the first pod schedules freely and the rest co-locate with it.
            # (requires k8s >= 1.31 for MatchLabelKeysInPodAffinity GA -- this
            # cluster is 1.35.)  No podAntiAffinity: multiple workflows may
            # still share a node, we only need same-workflow co-location.
            #
            # FUTURE: the cleaner fix is RWX workspaces -- stand up an NFS
            # StorageClass (democratic-csi supports it) and set
            # WOODPECKER_BACKEND_K8S_STORAGE_RWX=true +
            # WOODPECKER_BACKEND_K8S_STORAGE_CLASS=<nfs-class>.  That removes
            # this scheduling constraint entirely and drops the per-step iSCSI
            # provision/attach/detach latency that also slows pipelines.
            WOODPECKER_BACKEND_K8S_POD_AFFINITY: |
              podAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector: {}
                    matchLabelKeys:
                      - woodpecker-ci.org/task-uuid
                    topologyKey: kubernetes.io/hostname
            WOODPECKER_CONNECT_RETRY_COUNT: "5"
          persistence:
            enabled: true
            size: 1Gi
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
