---
apiVersion: v1
kind: Secret
metadata:
  name: searxng-bearer-token
  namespace: default
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: token
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "64"
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: searxng-metrics-password
  namespace: default
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "32"
type: Opaque
# SearXNG ignores the basic-auth username, but prometheus-operator rejects a
# ServiceMonitor whose basicAuth lacks a username secret ref
stringData:
  username: prometheus
---
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secret-key
  namespace: default
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: secret-key
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "64"
type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-engine-keys
  namespace: default
spec:
  refreshInterval: 300s
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  target:
    template:
      type: Opaque
      data:
        brave-api-key: "{{ .braveApiKey }}"
        marginalia-api-key: "{{ .marginaliaApiKey }}"
  data:
    - secretKey: braveApiKey
      remoteRef:
        key: searxng-braveapi-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: marginaliaApiKey
      remoteRef:
        key: searxng-marginalia-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: default
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "searxng-private"
      enable_metrics: true
      open_metrics: "METRICS_PASSWORD_PLACEHOLDER"

    server:
      limiter: false
      image_proxy: false

    search:
      formats:
        - json

    # Slower engines get dropped from responses at the default 3.0s timeout,
    # shrinking result diversity
    outgoing:
      request_timeout: 5.0
      max_request_timeout: 10.0
      retries: 1

    # Demote SEO farms; boost sources Claude Code queries most
    hostnames:
      high_priority:
        - (.*\.)?github\.com$
        - (.*\.)?stackoverflow\.com$
      low_priority:
        - (.*\.)?pinterest\.(com|co\.uk|fr|de)$
        - (.*\.)?quora\.com$
        - (.*\.)?softonic\.com$

    engines:
      # Official Brave Search API (independent index) — key from Bitwarden
      # via ExternalSecret; $5/mo free credit covers ~1k queries
      - name: braveapi
        inactive: false
        api_key: "BRAVE_API_KEY_PLACEHOLDER"
        weight: 1.3
      # Marginalia: independent index of non-commercial/text-heavy web —
      # strong for technical blogs and docs buried by SEO on other engines.
      # Free non-commercial key: https://about.marginalia-search.com/article/api/
      - name: marginalia
        inactive: false
        disabled: false
        api_key: "MARGINALIA_API_KEY_PLACEHOLDER"
      # Startpage proxies Google's index — best-quality results available
      # without scraping Google directly
      - name: startpage
        weight: 1.5
      - name: startpage news
        weight: 1.5
      # Mojeek and Qwant: independent indexes, scraping-tolerant
      - name: mojeek
        disabled: false
        weight: 1.2
      - name: mojeek news
        disabled: false
        weight: 1.2
      - name: qwant
        disabled: false
      - name: qwant news
        disabled: false
      - name: google
        disabled: true
      - name: google images
        disabled: true
      - name: google news
        disabled: true
      - name: google videos
        disabled: true
      - name: google scholar
        disabled: true
      - name: google play apps
        disabled: true
      - name: google play movies
        disabled: true
      - name: bing
        disabled: true
      - name: bing images
        disabled: true
      - name: bing news
        disabled: true
      - name: bing videos
        disabled: true
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: searxng-k8s-somemissing-info-cert
  namespace: default
spec:
  secretName: searxng-k8s-somemissing-info-tls
  issuerRef:
    name: cert-manager-webhook-dnsimple-production
    kind: ClusterIssuer
  commonName: &cn searxng.k8s.somemissing.info
  dnsNames:
    - *cn
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-nginx-config
  namespace: default
data:
  nginx.conf: |
    env BEARER_TOKEN;

    events {
        worker_connections 1024;
    }

    http {
        server {
            listen 443 ssl;
            server_name searxng.k8s.somemissing.info;

            ssl_certificate /etc/nginx/tls/tls.crt;
            ssl_certificate_key /etc/nginx/tls/tls.key;
            ssl_protocols TLSv1.2 TLSv1.3;

            location / {
                access_by_lua_block {
                    local auth = ngx.req.get_headers()["Authorization"]
                    if not auth then
                        ngx.status = ngx.HTTP_UNAUTHORIZED
                        ngx.header.content_type = "application/json"
                        ngx.say('{"error":"missing Authorization header"}')
                        return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                    end
                    local token = auth:match("^Bearer (.+)$")
                    if not token or token ~= os.getenv("BEARER_TOKEN") then
                        ngx.status = ngx.HTTP_UNAUTHORIZED
                        ngx.header.content_type = "application/json"
                        ngx.say('{"error":"invalid token"}')
                        return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                    end
                }

                proxy_pass http://localhost:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 30s;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: default
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: searxng
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
      app.kubernetes.io/component: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/component: searxng
    spec:
      initContainers:
        - name: inject-metrics-password
          image: registry.apps.nickv.me/library/busybox:1.38.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              PASS=$(cat /run/secrets/metrics-password/password)
              BRAVE_KEY=$(cat /run/secrets/engine-keys/brave-api-key)
              MARGINALIA_KEY=$(cat /run/secrets/engine-keys/marginalia-api-key)
              sed -e "s|METRICS_PASSWORD_PLACEHOLDER|$PASS|" \
                  -e "s|BRAVE_API_KEY_PLACEHOLDER|$BRAVE_KEY|" \
                  -e "s|MARGINALIA_API_KEY_PLACEHOLDER|$MARGINALIA_KEY|" \
                /etc/searxng-template/settings.yml > /etc/searxng/settings.yml
          volumeMounts:
            - name: searxng-settings-template
              mountPath: /etc/searxng-template
              readOnly: true
            - name: metrics-password
              mountPath: /run/secrets/metrics-password
              readOnly: true
            - name: engine-keys
              mountPath: /run/secrets/engine-keys
              readOnly: true
            - name: searxng-settings-rendered
              mountPath: /etc/searxng
      containers:
        - name: openresty
          image: registry.apps.nickv.me/openresty/openresty:1.31.1.1-alpine
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
          env:
            - name: BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: searxng-bearer-token
                  key: token
          volumeMounts:
            - name: nginx-config
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
        - name: searxng
          # renovate: datasource=docker depName=searxng/searxng versioning=regex:^(?<major>\d{4})\.(?<minor>\d+)\.(?<patch>\d+)-(?<build>[a-f0-9]+)$
          image: registry.apps.nickv.me/searxng/searxng:2026.7.3-c5cd510d8
          env:
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret-key
                  key: secret-key
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: searxng-settings-rendered
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: nginx-config
          configMap:
            name: searxng-nginx-config
        - name: tls
          secret:
            secretName: searxng-k8s-somemissing-info-tls
        - name: searxng-settings-template
          configMap:
            name: searxng-settings
        - name: metrics-password
          secret:
            secretName: searxng-metrics-password
        - name: engine-keys
          secret:
            secretName: searxng-engine-keys
        - name: searxng-settings-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: default
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: searxng
  annotations:
    external-dns.alpha.kubernetes.io/hostname: searxng.k8s.somemissing.info
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: searxng
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: searxng
  namespace: default
  labels:
    release: prom
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      basicAuth:
        username:
          name: searxng-metrics-password
          key: username
        password:
          name: searxng-metrics-password
          key: password
