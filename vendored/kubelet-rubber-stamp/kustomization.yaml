apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/service_account.yaml
  - base/role.yaml
  - base/role_binding.yaml
  - base/operator.yaml

patches:
  - target:
      kind: Deployment
      name: kubelet-rubber-stamp
      namespace: kube-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        # renovate: datasource=github-tags depName=nijave/kubelet-rubber-stamp
        value: registry.apps.nickv.me/nijave/kubelet-rubber-stamp:v0.3.2
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
