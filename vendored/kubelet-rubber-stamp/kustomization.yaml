apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/service_account.yaml
  - base/role.yaml
  - base/role_binding.yaml
  - base/operator.yaml

patches:
  - target:
      kind: Deployment
      name: kubelet-rubber-stamp
      namespace: kube-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        # renovate: datasource=docker depName=ghcr.io/nijave/kubelet-rubber-stamp
        value: ghcr.io/nijave/kubelet-rubber-stamp:0.4.0
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
