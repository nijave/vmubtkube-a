apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/vpa-v1-crd-gen.yaml
  - base/vpa-rbac.yaml
  - base/recommender-deployment.yaml
  # Local additions: expose the recommender's :8942 metrics to Prometheus.
  # Upstream ships no Service/ServiceMonitor/alerts.
  - service.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
  # Recommendation-only VPA objects live in the same Application as the CRD
  # install so cold-bootstrap syncs don't need SkipDryRunOnMissingResource.
  - vpa-crs.yaml
