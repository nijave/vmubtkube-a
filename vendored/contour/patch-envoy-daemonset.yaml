apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: envoy
  namespace: projectcontour
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # Surge new pods before terminating old ones (zero-downtime). Requires
      # the envoy listener hostPorts to be removed — see kustomization.yaml.
      maxUnavailable: 0
      maxSurge: 2
  template:
    spec:
      containers:
      - name: shutdown-manager
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      - name: envoy
        image: registry.apps.nickv.me/envoyproxy/envoy:v1.39.0
        resources:
          requests:
            cpu: 50m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 512Mi
      initContainers:
      - name: envoy-initconfig
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
