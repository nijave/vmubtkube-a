apiVersion: v1
kind: Service
metadata:
  name: envoy-lb
  namespace: projectcontour
  annotations:
    external-dns.alpha.kubernetes.io/hostname: contour.k8s.somemissing.info
spec:
  ports:
  - port: 80
    name: http
    protocol: TCP
    targetPort: 8080
  - port: 443
    name: https
    protocol: TCP
    targetPort: 8443
  selector:
    app: envoy
  type: LoadBalancer
  externalTrafficPolicy: Local
  allocateLoadBalancerNodePorts: false
