apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/high-availability.yaml

patches:
  # Upstream still ships policy/v1beta1, removed from Kubernetes since 1.25
  - target:
      kind: PodDisruptionBudget
      name: metrics-server
    patch: |-
      - op: replace
        path: /apiVersion
        value: policy/v1
